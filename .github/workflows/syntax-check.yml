name: Syntax Check

on:
  pull_request:
    branches: [main]

jobs:
  compile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile all Python files
        run: python -m compileall -q .
